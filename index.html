<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Layer Test</title>

<style>

body{
    margin:0;
    background:#222;
    overflow:hidden;
}

/* Uncomment for debug mode */
/*
img{
    outline:1px dashed red;
}
*/

/* LAYER 001 */
#photo-001{
    position:absolute;
    left:120px;
    top:100px;
    width:300px;
    height:auto;
    z-index:999;
    transform:rotate(0deg);
}

/* LAYER 002 */
#photo-002{
    position:absolute;
    left:260px;
    top:180px;
    width:280px;
    height:auto;
    z-index:998;
    transform:rotate(-8deg);
}

/* LAYER 003 */
#photo-003{
    position:absolute;
    left:500px;
    top:260px;
    width:260px;
    height:auto;
    z-index:997;
    transform:rotate(12deg);
}

</style>
</head>
<body>

<!-- LAYER 001 -->
<img
id="photo-001"
src="https://picsum.photos/400/300?random=1"
alt="">

<!-- LAYER 002 -->
<img
id="photo-002"
src="https://picsum.photos/400/300?random=2"
alt="">

<!-- LAYER 003 -->
<img
id="photo-003"
src="https://picsum.photos/400/300?random=3"
alt="">

</body>
</html>
